plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.bugsplatexpo'
version = '0.1.0'

android {
  namespace "expo.modules.bugsplatexpo"
  compileSdk 35

  defaultConfig {
    minSdk 26
    targetSdk 35
    versionCode 1
    versionName "0.1.0"
  }

  lintOptions {
    abortOnError false
  }
}

repositories {
  mavenCentral()
}

dependencies {
  implementation 'com.bugsplat:bugsplat-android:1.0.0'
}
